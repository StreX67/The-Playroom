<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Statki 15x15</title>

<style>

body{
background:#061b3a;
color:white;
font-family:Arial;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(15,30px);
grid-template-rows:repeat(15,30px);
gap:2px;
margin:20px auto;
width:max-content;
}

.cell{
width:30px;
height:30px;
background:#0b2f66;
cursor:pointer;
}

.ship{background:red;}
.hit{background:orange;}
.miss{background:#4aa3ff;}

#boards{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

button,select{
padding:8px;
margin:5px;
font-size:16px;
}

</style>
</head>
<body>

<h1>STATKI 15x15</h1>
<button onclick="location.href='index.html'">⬅ Powrót do menu</button>
Tryb:
<select id="mode">
<option value="bot">Vs Bot</option>
<option value="pvp">1v1</option>
</select>

<button onclick="rotateShip()">Obróć statek</button>
<button onclick="startGame()">Start</button>

<p id="info"></p>

<div id="boards">

<div>
<h3>Plansza Gracza 1</h3>
<div id="board1" class="board"></div>
</div>

<div>
<h3>Plansza Gracza 2 / Bot</h3>
<div id="board2" class="board"></div>
</div>

</div>

<script>

const SIZE=15
let ships=[4,3,3,2,2,2]

let board1,board2

let placing=true
let shipIndex=0
let horizontal=true

let currentPlayer=1
let placingPlayer=1

const info=document.getElementById("info")

const div1=document.getElementById("board1")
const div2=document.getElementById("board2")

function emptyBoard(){

let b=[]

for(let y=0;y<SIZE;y++){
b[y]=[]
for(let x=0;x<SIZE;x++)
b[y][x]=0
}

return b
}

function startGame(){

board1=emptyBoard()
board2=emptyBoard()

createBoard(div1,1)
createBoard(div2,2)

placing=true
shipIndex=0
placingPlayer=1

info.innerText="Gracz 1 ustaw statek długości "+ships[shipIndex]

}

function createBoard(div,boardNum){

div.innerHTML=""

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let c=document.createElement("div")
c.className="cell"

c.onclick=()=>cellClick(x,y,boardNum)

div.appendChild(c)

}
}

}

function cellClick(x,y,boardNum){

if(placing){

if(document.getElementById("mode").value==="bot"){
if(boardNum!==1) return
}else{
if(boardNum!==placingPlayer) return
}

placeShip(x,y)

}else{

if(currentPlayer===1 && boardNum===2)
shoot(board2,x,y)

else if(currentPlayer===2 && boardNum===1)
shoot(board1,x,y)

}

}

function rotateShip(){
horizontal=!horizontal
}

document.addEventListener("keydown",e=>{
if(e.key==="r") horizontal=!horizontal
})

function placeShip(x,y){

let board=placingPlayer===1?board1:board2
let len=ships[shipIndex]

if(!canPlace(board,x,y,len)) return

for(let i=0;i<len;i++){

let nx=horizontal?x+i:x
let ny=horizontal?y:y+i

board[ny][nx]=1

}

render()

shipIndex++

if(shipIndex>=ships.length){

shipIndex=0

if(document.getElementById("mode").value==="bot"){

placing=false
placeBotShips()
currentPlayer=1
info.innerText="Tura Gracza 1"

}else{

if(placingPlayer===1){

placingPlayer=2
info.innerText="Gracz 2 ustaw statek długości "+ships[shipIndex]

}else{

placing=false
currentPlayer=1
info.innerText="Tura Gracza 1"

}

}

}else{

info.innerText="Ustaw statek długości "+ships[shipIndex]

}

}

function canPlace(board,x,y,len){

for(let i=0;i<len;i++){

let nx=horizontal?x+i:x
let ny=horizontal?y:y+i

if(nx>=SIZE||ny>=SIZE||board[ny][nx]!==0)
return false

}

return true
}

function placeBotShips(){

for(let len of ships){

let placed=false

while(!placed){

let x=Math.floor(Math.random()*SIZE)
let y=Math.floor(Math.random()*SIZE)
let dir=Math.random()<0.5

if(canPlaceBot(board2,x,y,len,dir)){

for(let i=0;i<len;i++){

let nx=dir?x+i:x
let ny=dir?y:y+i

board2[ny][nx]=1

}

placed=true

}

}

}

}

function canPlaceBot(board,x,y,len,dir){

for(let i=0;i<len;i++){

let nx=dir?x+i:x
let ny=dir?y:y+i

if(nx>=SIZE||ny>=SIZE||board[ny][nx]!==0)
return false

}

return true
}

function shoot(board,x,y){

if(board[y][x]===0){

board[y][x]=3
currentPlayer=currentPlayer===1?2:1
info.innerText="Pudło! Tura gracza "+currentPlayer

}else if(board[y][x]===1){

board[y][x]=2
info.innerText="Trafiony! Strzel jeszcze raz"

}else return

render()

if(checkWin(board)){

info.innerText="🏆 Wygrał Gracz "+currentPlayer
placing=true

}

if(document.getElementById("mode").value==="bot" && currentPlayer===2)
setTimeout(botMove,500)

}

function botMove(){

let x,y

do{

x=Math.floor(Math.random()*SIZE)
y=Math.floor(Math.random()*SIZE)

}while(board1[y][x]>=2)

shoot(board1,x,y)

}

function checkWin(board){

return !board.flat().includes(1)

}

function render(){

if(placing){

if(placingPlayer===1){
draw(div1,board1,true)
draw(div2,board2,false)
}else{
draw(div1,board1,false)
draw(div2,board2,true)
}

}else{

draw(div1,board1,false)
draw(div2,board2,false)

}

}

function draw(div,board,showShips){

let cells=div.children
let i=0

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

cells[i].className="cell"

if(board[y][x]===1 && showShips)
cells[i].classList.add("ship")

if(board[y][x]===2)
cells[i].classList.add("hit")

if(board[y][x]===3)
cells[i].classList.add("miss")

i++

}
}

}

</script>

</body>
</html>
