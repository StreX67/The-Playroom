<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Cymbergaj PRO</title>

<style>
body{
background:#0b1d2a;
color:white;
text-align:center;
font-family:Arial;
margin:0;
overflow:hidden;
}

canvas{
background:#063248;
margin-top:10px;
border:3px solid #00eaff;
}

select,button{
margin:5px;
padding:6px;
}

#msg{
font-size:28px;
margin-top:10px;
display:none;
}

.controls{
position:fixed;
bottom:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.controls.left{ left:20px; }
.controls.right{ right:20px; }

.controls .row{ display:flex; }

.controls button{
width:60px;
height:60px;
margin:4px;
font-size:20px;
border:none;
border-radius:10px;
background:#00eaff55;
color:white;
touch-action:none;
user-select:none;
-webkit-user-select:none;
}

.controls button:active{
background:#00eaff;
}
</style>
</head>

<body>

<h2>Cymbergaj PRO Balanced</h2>
<button onclick="location.href='index.html'">⬅ Powrót do menu</button>

Tryb:
<select id="mode" onchange="updateControls()">
<option value="bot">1 vs Bot</option>
<option value="pvp">1 vs 1</option>
</select>

Poziom bota:
<select id="bot">
<option value="1">Łatwy</option>
<option value="2">Średni</option>
<option value="3">Trudny</option>
</select>

Czas:
<select id="time">
<option value="60">1 min</option>
<option value="180">3 min</option>
<option value="300">5 min</option>
</select>

<button id="startBtn" onclick="start()">START</button>

<div>Gracz 1: <span id="s1">0</span> | Gracz 2: <span id="s2">0</span></div>
<div>Czas: <span id="t">0</span></div>
<div id="msg"></div>

<canvas id="c" width="900" height="500"></canvas>

<div class="controls left" id="controlsP1">
<div class="row"><button data-key="ArrowUp">▲</button></div>
<div class="row">
<button data-key="ArrowLeft">◀</button>
<button data-key="ArrowDown">▼</button>
<button data-key="ArrowRight">▶</button>
</div>
</div>

<div class="controls right" id="controlsP2">
<div class="row"><button data-key="w">▲</button></div>
<div class="row">
<button data-key="a">◀</button>
<button data-key="s">▼</button>
<button data-key="d">▶</button>
</div>
</div>

<script>

let c=document.getElementById("c"),ctx=c.getContext("2d");

let p1,p2,puck;
let keys={},lastPress={};

let s1=0,s2=0,time=0,run=false,last=0;
let goalTop=180,goalBottom=320;

let dashCooldownP1=0,dashCooldownP2=0;

let mode=document.getElementById("mode");
let botSel=document.getElementById("bot");
let timeSel=document.getElementById("time");
let s1Span=document.getElementById("s1");
let s2Span=document.getElementById("s2");
let t=document.getElementById("t");
let msg=document.getElementById("msg");

document.addEventListener("keydown",e=>{
if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)){
e.preventDefault();
}
if(!run)return;
if(!keys[e.key]) handleDash(e.key);
keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key]=false;
});

window.addEventListener("blur",()=>{ keys={}; });

function handleDash(key){
let now=Date.now();
if(lastPress[key] && now-lastPress[key]<220){
dash(key);
}
lastPress[key]=now;
}

function dash(key){
if(key.includes("Arrow") && dashCooldownP1<=0){
p1.dash=10;
dashCooldownP1=25;
}
if("wasd".includes(key) && mode.value=="pvp" && dashCooldownP2<=0){
p2.dash=10;
dashCooldownP2=25;
}
}

function start(){

run=false;

s1=0;
s2=0;

s1Span.innerText=0;
s2Span.innerText=0;

resetAll();

document.getElementById("startBtn").disabled=true;
mode.disabled=true;
botSel.disabled=true;
timeSel.disabled=true;

time=parseInt(timeSel.value);

let count=3;

msg.style.display="block";
msg.innerText=count;

let countdown=setInterval(()=>{

count--;

if(count>0){
msg.innerText=count;
}
else if(count===0){
msg.innerText="START!";
}
else{

clearInterval(countdown);

msg.style.display="none";
run=true;
last=0;
requestAnimationFrame(loop);

}

},1000);

updateControls();
}

function resetAll(){
p1={x:120,y:250,r:22,dash:0};
p2={x:780,y:250,r:22,dash:0,vx:0,vy:0,targetX:780,targetY:250,decisionTimer:0};
puck={x:450,y:250,vx:0,vy:0,r:12,friction:0.99};
}

function stableBot(){

let lvl=parseInt(botSel.value);

let maxSpeed = 5.8;

let reaction;
let attackChance;

if(lvl==1){
reaction = 0.03;
attackChance = 0.35;
}
if(lvl==2){
reaction = 0.045;
attackChance = 0.5;
}
if(lvl==3){
reaction = 0.06;
attackChance = 0.7;
}

let danger = (puck.vx>0 && puck.x>520);

p2.decisionTimer--;
if(p2.decisionTimer<=0){

if(danger){

p2.targetX = 760 + Math.random()*20;
p2.targetY = puck.y + (Math.random()*40-20);

if(Math.abs(puck.vx)<2){
p2.targetX = 720;
}

}else{

if(Math.random()<attackChance){
p2.targetX = puck.x-15;
p2.targetY = puck.y + (Math.random()*20-10);
}else{
p2.targetX = 760 + Math.sin(Date.now()*0.002)*20;
p2.targetY = 250;
}

}

p2.decisionTimer = 15;
}

let dx = p2.targetX - p2.x;
let dy = p2.targetY - p2.y;

p2.vx = p2.vx*0.7 + dx*reaction;
p2.vy = p2.vy*0.7 + dy*reaction;

let len = Math.hypot(p2.vx,p2.vy);
if(len>maxSpeed){
p2.vx = p2.vx/len*maxSpeed;
p2.vy = p2.vy/len*maxSpeed;
}

p2.x += p2.vx;
p2.y += p2.vy;
}

function move(){

let baseSpeed=5.8;

if(p1.dash>0)p1.dash--;
if(p2.dash>0)p2.dash--;

let speed1=baseSpeed+(p1.dash?6:0);
let speed2=baseSpeed+(p2.dash?6:0);

if(keys.ArrowUp)p1.y-=speed1;
if(keys.ArrowDown)p1.y+=speed1;
if(keys.ArrowLeft)p1.x-=speed1;
if(keys.ArrowRight)p1.x+=speed1;

if(mode.value=="pvp"){
if(keys.w)p2.y-=speed2;
if(keys.s)p2.y+=speed2;
if(keys.a)p2.x-=speed2;
if(keys.d)p2.x+=speed2;
}else stableBot();

bounds();
collisions();
}

function collisions(){

let baseHit=7;
let dashMulti=2;

let dx=puck.x-p1.x;
let dy=puck.y-p1.y;
let d=Math.hypot(dx,dy);

if(d<p1.r+puck.r){
let angle=Math.atan2(dy,dx);
if(p1.dash>0){
puck.vx=Math.cos(angle)*baseHit*dashMulti;
puck.vy=Math.sin(angle)*baseHit*dashMulti;
puck.friction=0.995;
}else{
puck.vx=Math.cos(angle)*baseHit;
puck.vy=Math.sin(angle)*baseHit;
puck.friction=0.99;
}
}

dx=puck.x-p2.x;
dy=puck.y-p2.y;
d=Math.hypot(dx,dy);

if(d<p2.r+puck.r){
let angle=Math.atan2(dy,dx);
if(p2.dash>0){
puck.vx=Math.cos(angle)*baseHit*dashMulti;
puck.vy=Math.sin(angle)*baseHit*dashMulti;
puck.friction=0.995;
}else{
puck.vx=Math.cos(angle)*baseHit;
puck.vy=Math.sin(angle)*baseHit;
puck.friction=0.99;
}
}

puck.x+=puck.vx;
puck.y+=puck.vy;

puck.vx*=puck.friction;
puck.vy*=puck.friction;

if(puck.y-puck.r<0){ puck.y=puck.r; puck.vy*=-1; }
if(puck.y+puck.r>500){ puck.y=500-puck.r; puck.vy*=-1; }

if(puck.x-puck.r<0){
if(puck.y>goalTop&&puck.y<goalBottom){
s2++; s2Span.innerText=s2; resetAll();
}else{
puck.x=puck.r; puck.vx*=-1;
}
}

if(puck.x+puck.r>900){
if(puck.y>goalTop&&puck.y<goalBottom){
s1++; s1Span.innerText=s1; resetAll();
}else{
puck.x=900-puck.r; puck.vx*=-1;
}
}
}

function bounds(){
p1.x=Math.max(22,Math.min(440,p1.x));
p2.x=Math.max(470,Math.min(878,p2.x));
p1.y=Math.max(22,Math.min(478,p1.y));
p2.y=Math.max(22,Math.min(478,p2.y));
}

function draw(){
ctx.clearRect(0,0,900,500);

ctx.beginPath();
ctx.moveTo(450,0);
ctx.lineTo(450,500);
ctx.strokeStyle="#00eaff";
ctx.lineWidth=3;
ctx.stroke();

ctx.fillStyle="#fff";
ctx.fillRect(0,goalTop,10,goalBottom-goalTop);
ctx.fillRect(890,goalTop,10,goalBottom-goalTop);

circle(p1,"#0f8");
circle(p2,"#f06");
circle(puck,"#fff");
}

function circle(o,c){
ctx.beginPath();
ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
ctx.fillStyle=c;
ctx.fill();
}

function loop(ts){
if(!run)return;
let dt=(ts-last)/1000;
last=ts;
time-=dt;

if(time<=0){
time=0;
run=false;

msg.style.display="block";
msg.innerText=s1>s2?"WYGRYWA GRACZ 1":s2>s1?"WYGRYWA GRACZ 2":"REMIS";

document.getElementById("startBtn").disabled=false;
mode.disabled=false;
botSel.disabled=false;
timeSel.disabled=false;

return;
}

move();
draw();

t.innerText=Math.ceil(time);

if(dashCooldownP1>0)dashCooldownP1--;
if(dashCooldownP2>0)dashCooldownP2--;

requestAnimationFrame(loop);
}

document.querySelectorAll(".controls button").forEach(btn=>{
let key=btn.dataset.key;

function press(e){
e.preventDefault();
handleDash(key);
keys[key]=true;
}

function release(e){
e.preventDefault();
keys[key]=false;
}

btn.addEventListener("touchstart",press,{passive:false});
btn.addEventListener("touchend",release);
btn.addEventListener("touchcancel",release);
btn.addEventListener("mousedown",press);
btn.addEventListener("mouseup",release);
btn.addEventListener("mouseleave",release);
btn.addEventListener("contextmenu",e=>e.preventDefault());
});

function updateControls(){
if(mode.value=="bot"){
document.getElementById("controlsP2").style.display="none";
}else{
document.getElementById("controlsP2").style.display="flex";
}
}

</script>
</body>
</html>
